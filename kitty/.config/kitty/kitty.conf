# Font
font_family      JetBrainsMono Nerd Font
font_size        12.0

# Cursor
cursor_shape     beam
cursor_blink_interval 0

# Window
background_opacity 0.95
window_padding_width 8
confirm_os_window_close 0

# Colours — VS Code Dark+ inspired
foreground            #d4d4d4
background            #1e1e1e
selection_foreground  #1e1e1e
selection_background  #264f78

cursor            #aeafad
cursor_text_color #1e1e1e

# black
color0  #1e1e1e
color8  #666666

# red
color1  #f44747
color9  #f44747

# green
color2  #6a9955
color10 #6a9955

# yellow
color3  #dcdcaa
color11 #dcdcaa

# blue
color4  #569cd6
color12 #569cd6

# magenta
color5  #c586c0
color13 #c586c0

# cyan
color6  #4ec9b0
color14 #4ec9b0

# white
color7  #d4d4d4
color15 #ffffff

# Tab bar
tab_bar_style          powerline
tab_powerline_style     slanted
active_tab_background   #007acc
active_tab_foreground   #ffffff
inactive_tab_background #252526
inactive_tab_foreground #969696

# Clipboard
clipboard_control write-clipboard write-primary read-clipboard read-primary
